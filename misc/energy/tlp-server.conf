# TLP config for adal (Apple Mac Mini 7,1 — Haswell i5, headless server)
# /etc/tlp.d/99-adal.conf

TLP_ENABLE=1
TLP_DEFAULT_MODE=AC

# CPU — powersave governor, let CPU idle deeply
CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_ENERGY_PERF_POLICY_ON_AC=power
CPU_MIN_PERF_ON_AC=0
CPU_MAX_PERF_ON_AC=100

# Disable CPU turbo boost (server rarely needs burst, saves heat/power)
CPU_BOOST_ON_AC=0

# PCIe ASPM — aggressive power saving
PCIE_ASPM_ON_AC=powersupersave

# SATA link power management
SATA_LINKPWR_ON_AC="med_power_with_dipm med_power_with_dipm med_power_with_dipm"

# Disk APM — sda (system SSD/HDD): 128 = allow spindown; sdc = backup disk
DISK_APM_LEVEL_ON_AC="128 128"
DISK_SPINDOWN_TIMEOUT_ON_AC="120 60"

# NIC power saving
WIFI_PWR_ON_AC=off

# Disable Wake-on-LAN (use Tailscale to reach server remotely)
WOL_DISABLE=Y

# USB autosuspend — keep enabled (2s default)
USB_AUTOSUSPEND=1
